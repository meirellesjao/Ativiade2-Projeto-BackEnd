<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro - JV Cursos</title>
<link rel="stylesheet" href="stylecadastro.css">
</head>

<body>

<div class="logo">
    <span class="icone">💻</span>
    <h2>JV Cursos</h2>
</div>

<div class="login-container">

    <h2>Crie sua conta</h2>
    <p class="subtitulo">Preencha os dados abaixo para se cadastrar.</p>

    <form>

        <label>Nome Completo</label>
        <input type="text" placeholder="Ex: João Silva">

        <label>E-mail</label>
        <input type="email" placeholder="joao@exemplo.com">

        <label>Senha</label>
        <input type="password" placeholder="Mínimo 8 caracteres">

        <label>Confirmar Senha</label>
        <input type="password" placeholder="Repita a senha">

        <button type="submit">Cadastrar</button>

    </form>

</div>

<p class="cadastro-link">
    Já tem uma conta? <a href="login.html">Entrar</a>
</p>

</body>
</html>
