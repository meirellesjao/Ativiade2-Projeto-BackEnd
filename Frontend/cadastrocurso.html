<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro - JV Cursos</title>
<link rel="stylesheet" href="stylecadastro.css">
</head>

<body>

<div class="logo">
    <span class="icone">💻</span>
    <h2>JV Cursos</h2>
</div>

<div class="login-container">

    <h2>Cadastrar um novo curso</h2>
    <p class="subtitulo">Preencha os dados abaixo para cadastrar um novo curso.</p>

<form id="formCurso">

<label>Nome do Curso</label>
<input type="text" id="titulo" placeholder="Ex: Curso de Node.js">

<label>Descrição</label>
<input type="text" id="descricao" placeholder="Aprenda Node do 0.">

<label>Duração</label>
<input type="text" id="duracao" placeholder="10h">

<label>Status</label>
<input type="text" id="status" placeholder="Ativo ou Em Breve">

<button type="submit">Cadastrar</button>
<p id="mensagem"></p>

</form>
</div>
<script src="script.js"></script>
</body>
</html>
